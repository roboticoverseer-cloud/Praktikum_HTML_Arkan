<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scenery Auth - Sign In & Sign Up</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: linear-gradient(to bottom, #87CEEB 0%, #228B22 50%, #696969 100%);
            color: #333;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 16px;
            position: relative;
        }

        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 40%;
            background: linear-gradient(to bottom, #87CEEB, #4682B4);
            z-index: -1;
        }

        body::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 60%;
            background: linear-gradient(to top, #696969, #228B22);
            z-index: -1;
        }

        .mountain {
            position: absolute;
            bottom: 60%;
            left: 20%;
            width: 0;
            height: 0;
            border-left: 50px solid transparent;
            border-right: 50px solid transparent;
            border-bottom: 100px solid #228B22;
            z-index: -1;
        }

        .mountain2 {
            position: absolute;
            bottom: 60%;
            right: 20%;
            width: 0;
            height: 0;
            border-left: 40px solid transparent;
            border-right: 40px solid transparent;
            border-bottom: 80px solid #32CD32;
            z-index: -1;
        }

        .river {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 20%;
            background: linear-gradient(to right, #696969, #A9A9A9, #696969);
            z-index: -1;
        }

        .container {
            background-color: rgba(255, 255, 255, 0.95);
            border: 1px solid #ccc;
            border-radius: 5px;
            padding: 20px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            position: relative;
            z-index: 1;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 20px;
            color: #228B22;
        }

        .toggle {
            display: flex;
            margin-bottom: 20px;
        }

        .toggle button {
            flex: 1;
            padding: 10px;
            background-color: #e0e0e0;
            color: #333;
            border: 1px solid #ccc;
            cursor: pointer;
            font-size: 16px;
        }

        .toggle button.active {
            background-color: #228B22;
            color: #fff;
        }

        .toggle button:hover {
            background-color: #87CEEB;
        }

        form {
            display: none;
        }

        form.active {
            display: block;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            background-color: #fff;
            color: #333;
            border: 1px solid #ccc;
            border-radius: 3px;
            font-size: 16px;
        }

        input:focus {
            outline: none;
            border-color: #228B22;
        }

        button[type="submit"] {
            width: 100%;
            padding: 10px;
            background-color: #228B22;
            color: #fff;
            border: none;
            border-radius: 3px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }

        button[type="submit"]:hover {
            background-color: #006400;
        }

        .footer {
            margin-top: 20px;
            font-size: 12px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="mountain"></div>
    <div class="mountain2"></div>
    <div class="river"></div>
    <div class="container">
        <h1>Scenery Auth</h1>
        <div class="toggle">
            <button id="signin-btn" class="active">Sign In</button>
            <button id="signup-btn">Sign Up</button>
        </div>

        <form id="signin-form" class="active">
            <input type="email" placeholder="Email" required>
            <input type="password" placeholder="Password" required>
            <button type="submit">Sign In</button>
        </form>

        <form id="signup-form">
            <input type="text" placeholder="Full Name" required>
            <input type="email" placeholder="Email" required>
            <input type="password" placeholder="Password" required>
            <input type="password" placeholder="Confirm Password" required>
            <button type="submit">Sign Up</button>
        </form>

        <div class="footer">
            <p>© 2023 Scenery Auth. Enjoy the view!</p>
        </div>
    </div>

    <script>
        const signinBtn = document.getElementById('signin-btn');
        const signupBtn = document.getElementById('signup-btn');
        const signinForm = document.getElementById('signin-form');
        const signupForm = document.getElementById('signup-form');

        signinBtn.addEventListener('click', () => {
            signinBtn.classList.add('active');
            signupBtn.classList.remove('active');
            signinForm.classList.add('active');
            signupForm.classList.remove('active');
        });

        signupBtn.addEventListener('click', () => {
            signupBtn.classList.add('active');
            signinBtn.classList.remove('active');
            signupForm.classList.add('active');
            signinForm.classList.remove('active');
        });
    </script>
</body>
</html>
